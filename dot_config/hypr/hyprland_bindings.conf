
# Don't recommend ALT (used by other programs)
$mod = SUPER

# # Hyprland style
# $workspace = workspace

# Qtile-style (got used to it)
$workspace = focusworkspaceoncurrentmonitor

# Launch apps
binde = $mod, RETURN, exec, foot
binde = $mod shift, RETURN, exec, foot -H qalc
bind = $mod, E, exec, thunar
bind = $mod, w, exec, firefox -p
bind = $mod, m, exec, mpv $(wl-paste) --ytdl-format="bv[height<=1080]+ba"
binde = $mod, b, exec, pkill waybar || waybar &
binde = $mod, d, exec, qs ipc call hee toggle
bind = $mod, r, exec, pkill wofi || wofi --show drun
binde = $mod, c, exec, hyprpicker -a
bind = $mod, v, exec, killall hyprpaper || hyprpaper &

# window management
binde = $mod shift, c, killactive,
binde = $mod, t, togglefloating,
binde = $mod, f, fullscreen, 1 # maximize
binde = $mod shift, f, fullscreen # fullscreen
binde = $mod ctrl, f, fullscreenstate, -1, 2
binde = $mod, z, layoutmsg, togglesplit

# monitors
bind = $mod, Tab, focusmonitor, +1
bind = $mod shift, Tab, swapactiveworkspaces, 0 1

# lock, exit
bind = $mod, n, exec, hyprlock &
bind = $mod shift, n, exec, sleep 1 && hyprctl dispatch dpms off
bind = $mod control, n, exec, suspend

bind = $mod control, q, exit

# screenshot
bind = ,        Print, exec, grim -o $mon_external && notify-send "screenshot taken" "$mon_external"
bindl = super,      g, exec, grim                  && notify-send "screenshot taken" "all monitors"
bind = super shift, g, exec, grim -g "$(slurp)"    && notify-send "screenshot taken" "selection"

# Switch workspaces
bind = $mod, 0, $workspace, name: desktop
bind = $mod, 1, $workspace, 1
bind = $mod, 2, $workspace, 2
bind = $mod, 3, $workspace, 3
bind = $mod, 4, $workspace, 4
bind = $mod, u, $workspace, 5
bind = $mod, i, $workspace, 6
bind = $mod, o, $workspace, 7
bind = $mod, p, $workspace, 8

# Move active window to a workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, u, movetoworkspace, 5
bind = $mod SHIFT, i, movetoworkspace, 6
bind = $mod SHIFT, o, movetoworkspace, 7
bind = $mod SHIFT, p, movetoworkspace, 8

# move focus
binde = $mod, h, movefocus, l
binde = $mod, l, movefocus, r
binde = $mod, k, movefocus, u
binde = $mod, j, movefocus, d
binde = $mod, space, cyclenext
binde = $mod shift, space, cyclenext, prev

# Move active window in a workspace
bind = $mod SHIFT, h, swapwindow, l
bind = $mod SHIFT, j, swapwindow, d
bind = $mod SHIFT, k, swapwindow, u
bind = $mod SHIFT, l, swapwindow, r

# Resize windows
$d = 20
binde = $mod control, h, resizeactive, -$d 0
binde = $mod control, l, resizeactive, $d 0
binde = $mod control, k, resizeactive, 0 -$d
binde = $mod control, j, resizeactive, 0 $d

# Example special workspace (scratchpad)
bind = $mod, S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

################
## MULTI-MEDIA ##
################

$bright = exec, brightnessctl s # +/-
$volume = exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ # +/-
$toggle_mute = exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bindle = , XF86MonBrightnessDown, $bright 5%-
bindle = , XF86MonBrightnessUp,   $bright 5%+
bindle = , XF86AudioLowerVolume, $volume 5%-
bindle = , XF86AudioRaiseVolume, $volume 5%+
bindl  = , XF86AudioMute,        $toggle_mute

## F keys for keyboards without multi-media keys
bindle = $mod, F1, $toggle_mute
bindle = $mod, F2, $volume 5%-
bindle = $mod, F3, $volume 5%+
bindle = $mod shift, F2, $volume 100%-
bindle = $mod shift, F3, $volume 100%+

$temp = exec, hyprctl hyprsunset temperature
bindle = $mod control, F6, $temp -100
bindle = $mod control, F7, $temp +100
bindle = $mod, KP_Home, $temp -100
bindle = $mod, KP_UP, $temp +100

bindle = $mod, F6, $bright 5%-
bindle = $mod, F7, $bright 5%+
bindle = $mod shift, F6, $bright 0%
bindle = $mod shift, F7, $bright 100%

bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPlay, exec, playerctl play-pause

# zoom in on the cursor
bind = $mod ALT, K, exec, hyprctl keyword cursor:zoom_factor 5
bind = $mod ALT, J, exec, hyprctl keyword cursor:zoom_factor 1

